<!doctype html>
<html lang="es">
  <head>

    <meta
      name="description"

    <title>Página de Brass</title>

    <link rel="stylesheet" href="Css/Style.css" />
  </head>

  <body>
    <header>
      <h1>Página de Brass dev</h1>

    <main>

      <section>
        <p class="Normal-text">
          Hola, aquí la página de un futuro game dev. Actualmente estoy

          <a

      <!-- Secciones -->
      <section>

      <form>
        <fieldset>

            id="email"
            name="email"
            placeholder="example@gmail.com"

        <button type="submit">Enviar</button>
